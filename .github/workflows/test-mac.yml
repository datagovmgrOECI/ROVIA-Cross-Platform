name: Test Mac Installer

on:
  push:
    branches: [feature/mac-support]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test-mac-install:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            label: Apple Silicon M1 (macos-14)
          - os: macos-15
            label: Apple Silicon M2/M3 (macos-15)

    runs-on: ${{ matrix.os }}
    name: Mac — ${{ matrix.label }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Miniforge
        run: |
          ARCH=$(uname -m)
          INSTALLER="Miniforge3-MacOSX-${ARCH}.sh"
          curl -L -O "https://github.com/conda-forge/miniforge/releases/latest/download/${INSTALLER}"
          bash "${INSTALLER}" -b -p "$HOME/miniforge3"
          echo "$HOME/miniforge3/bin" >> "$GITHUB_PATH"

      - name: Run mac_install.sh
        run: bash mac_install.sh

      - name: Verify imports in rovia environment
        run: |
          source "$HOME/miniforge3/etc/profile.d/conda.sh"
          conda activate rovia
          python -c "
          import tensorflow as tf
          import cv2
          import numpy as np
          import moviepy
          import h5py
          print('tensorflow:', tf.__version__)
          print('opencv:', cv2.__version__)
          print('numpy:', np.__version__)
          print('h5py:', h5py.__version__)
          print('All imports OK')
          "
